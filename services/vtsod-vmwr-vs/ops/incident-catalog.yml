# Каталог инцидентов услуги ВЦОД-VMWR-VS.
# Schema: tools/schemas/incident-catalog.schema.json
# Источник: Внешняя Спецификация Услуги v0.6, Таблицы 5 и 10.

metadata:
  service_code: "ВЦОД-VMWR-VS"
  version: "0.1.0"
  last_updated: "2026-03-02"

business_hours:
  timezone: "UTC+3"
  schedule: "Пн–Пт 09:00–18:00 МСК"

incidents:
  - priority: 1
    description: "Критический инцидент — полная недоступность или грубое нарушение характеристик услуги"
    thresholds:
      - metric: "Доступность ВМ"
        condition: "Недоступность виртуальной машины"
      - metric: "Доступность консоли управления"
        condition: "Недоступность консоли управления облачного ВЦОД более 30 минут"
      - metric: "RAM Swapped"
        condition: "Процент от сконфигурированной памяти ВМ > 30%"
      - metric: "Время отклика диска тип 1"
        condition: "Среднее время отклика > 1000 мс"
      - metric: "Время отклика диска тип 2"
        condition: "Среднее время отклика > 100 мс"
      - metric: "Время отклика диска тип 3"
        condition: "Среднее время отклика > 20 мс"
      - metric: "Потери пакетов в СПД"
        condition: "Процент потерянных пакетов > 1%"
      - metric: "Сетевая задержка в СПД"
        condition: "Средняя задержка > 25 мс"
      - metric: "IOPS дискового пространства"
        condition: "Снижение на 50% и более от оговоренных значений"
      - metric: "Пропускная способность МСЭ"
        condition: "Снижение на 50% и более от оговоренных значений"
      - metric: "Связь с Интернет"
        condition: "Пропадание связи с публичной сетью Интернет более 10 минут"
      - metric: "Количественные характеристики"
        condition: "Отклонение количественных характеристик предоставления услуги от оговоренного"
    slt:
      reaction_minutes: 10
      resolution_hours: 1.5
      processing: "24x7"

  - priority: 2
    description: "Значительное ухудшение качества услуги"
    thresholds:
      - metric: "RAM Swapped"
        condition: "Процент от сконфигурированной памяти ВМ от 21% до 30% включительно"
      - metric: "Время отклика диска тип 1"
        condition: "Среднее время отклика от 501 до 1000 мс включительно"
      - metric: "Время отклика диска тип 2"
        condition: "Среднее время отклика от 41 до 100 мс включительно"
      - metric: "Время отклика диска тип 3"
        condition: "Среднее время отклика от 11 до 20 мс включительно"
      - metric: "Потери пакетов в СПД"
        condition: "Процент потерянных пакетов от 0.41% до 1% включительно"
      - metric: "Сетевая задержка в СПД"
        condition: "Средняя задержка от 11 до 25 мс включительно"
      - metric: "IOPS дискового пространства"
        condition: "Снижение на 21%–50% включительно от оговоренных значений"
      - metric: "Пропускная способность МСЭ"
        condition: "Снижение на 21%–50% включительно от оговоренных значений"
      - metric: "Сетевая связность между ВМ"
        condition: "Пропадание сетевой связности между виртуальными машинами в пределах подсетей ВЦОД"
    slt:
      reaction_minutes: 15
      resolution_hours: 2
      processing: "24x7"

  - priority: 3
    description: "Незначительное ухудшение качества услуги"
    thresholds:
      - metric: "RAM Swapped"
        condition: "Процент от сконфигурированной памяти ВМ от 11% до 20% включительно"
      - metric: "Время отклика диска тип 1"
        condition: "Среднее время отклика от 101 до 500 мс включительно"
      - metric: "Время отклика диска тип 2"
        condition: "Среднее время отклика от 21 до 40 мс включительно"
      - metric: "Время отклика диска тип 3"
        condition: "Среднее время отклика от 6 до 10 мс включительно"
      - metric: "Потери пакетов в СПД"
        condition: "Процент потерянных пакетов от 0.21% до 0.4% включительно"
      - metric: "Сетевая задержка в СПД"
        condition: "Средняя задержка от 11 до 25 мс включительно"
      - metric: "IOPS дискового пространства"
        condition: "Снижение до 20% включительно от оговоренных значений"
      - metric: "Пропускная способность МСЭ"
        condition: "Снижение до 20% включительно от оговоренных значений"
    slt:
      reaction_minutes: 15
      resolution_hours: 4
      processing: "24x7"

unavailability_conditions:
  - "Отказ оборудования и/или ПО, повлёкший полное прекращение оказания услуги"
  - "Отсутствие решения инцидента приоритета 1 в течение оговоренного времени решения (недоступность фиксируется с момента превышения SLT)"
