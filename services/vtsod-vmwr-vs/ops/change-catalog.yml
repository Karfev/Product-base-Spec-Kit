# Параметры стандартных изменений услуги ВЦОД-VMWR-VS.
# Schema: tools/schemas/change-catalog.schema.json
# Источник: Внешняя Спецификация Услуги v0.6, Таблица 4.

metadata:
  service_code: "ВЦОД-VMWR-VS"
  version: "0.1.0"
  last_updated: "2026-03-02"

change_period_months: 4
non_standard_review_workdays: 20
non_standard_max_months: 4

billing_rules:
  increase_in_period: "При увеличении параметра в текущем отчётном периоде объём предоставления услуги за весь период принимается равным увеличенным параметрам"
  decrease_in_period: "При уменьшении параметра в текущем отчётном периоде объём остаётся неизменным; уменьшенные значения учитываются со следующего периода"
  deferred_allowed: true

parameters:
  - name: "Процессорные ядра #1, vCPU"
    standard_change:
      type: "percent"
      value: 10
      max_limit: 96
      max_limit_unit: "шт."

  - name: "Оперативная память, vRAM"
    standard_change:
      type: "percent"
      value: 15
      max_limit: 1536
      max_limit_unit: "Гб"

  - name: "Дисковое пространство тип 1"
    standard_change:
      type: "percent"
      value: 20
      max_limit: null
      max_limit_unit: "Гб"

  - name: "Дисковое пространство тип 2"
    standard_change:
      type: "percent"
      value: 15
      max_limit: null
      max_limit_unit: "Гб"

  - name: "Дисковое пространство тип 3"
    standard_change:
      type: "percent"
      value: 10
      max_limit: null
      max_limit_unit: "Гб"

  - name: "Канал доступа в публичную сеть Интернет"
    standard_change:
      type: "percent"
      value: 20
      max_limit: 200
      max_limit_unit: "Мбит/с"

  - name: "Публичный адрес IPv4"
    standard_change:
      type: "absolute"
      value: 5
      max_limit: null

  - name: "Логическая виртуальная подсеть (VLAN)"
    standard_change:
      type: "absolute"
      value: 100
      max_limit: null

  - name: "Гарантированная пропускная способность МСЭ (Stateful-Firewall)"
    standard_change:
      type: "percent"
      value: 25
      max_limit: 1000
      max_limit_unit: "Мбит/с"

  - name: "VPN-клиент для удалённого доступа к консоли управления"
    standard_change:
      type: "absolute"
      value: 5
      max_limit: null

  - name: "Терминальный сервер для доступа к консоли управления"
    standard_change:
      type: "absolute"
      value: 5
      max_limit: null
