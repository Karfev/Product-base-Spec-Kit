# Тарифицируемые параметры услуги ВЦОД-VMWR-VS.
# Schema: tools/schemas/billing-parameters.schema.json
# Источник: Внешняя Спецификация Услуги v0.6, Таблицы 2 и 4.

metadata:
  service_code: "ВЦОД-VMWR-VS"
  version: "0.1.0"
  last_updated: "2026-03-02"
  billing_period: "monthly"

# Условный период для стандартных изменений
change_period_months: 4
non_standard_review_days: 20
non_standard_max_months: 4

groups:
  - group: "Вычислительные ресурсы"
    parameters:
      - name: "Процессорные ядра #1, vCPU"
        unit: "шт."
        step: 4
        standard_change:
          pct: 10
          max_value: 96
          unit: "шт."

      - name: "Оперативная память, vRAM"
        unit: "Гигабайт (Гб)"
        step: 16
        standard_change:
          pct: 15
          max_value: 1536
          unit: "Гб"

      - name: "Дисковое пространство тип 1"
        unit: "Гигабайт (Гб)"
        step: 1000
        standard_change:
          pct: 20
          max_value: null
          unit: "Гб"

      - name: "Дисковое пространство тип 2"
        unit: "Гигабайт (Гб)"
        step: 500
        standard_change:
          pct: 15
          max_value: null
          unit: "Гб"

      - name: "Дисковое пространство тип 3"
        unit: "Гигабайт (Гб)"
        step: 500
        standard_change:
          pct: 10
          max_value: null
          unit: "Гб"

  - group: "Услуги связи"
    parameters:
      - name: "Канал доступа в публичную сеть Интернет"
        unit: "Мегабит в секунду (Мбит/с)"
        step: 100
        standard_change:
          pct: 20
          max_value: 200
          unit: "Мбит/с"

      - name: "Публичный адрес IPv4"
        unit: "шт."
        step: 1
        standard_change:
          max_items: 5
          unit: "шт."

      - name: "Логическая виртуальная подсеть (VLAN)"
        unit: "шт."
        step: 10
        standard_change:
          max_items: 100
          unit: "шт."

      - name: "Гарантированная пропускная способность МСЭ (Stateful-Firewall)"
        unit: "Мегабит в секунду (Мбит/с)"
        step: 500
        standard_change:
          pct: 25
          max_value: 1000
          unit: "Мбит/с"

  - group: "Услуги удалённого доступа"
    parameters:
      - name: "VPN-клиент для удалённого доступа к консоли управления"
        unit: "шт."
        step: 1
        standard_change:
          max_items: 5
          unit: "шт."

      - name: "Терминальный сервер для доступа к консоли управления"
        unit: "шт."
        step: 1
        standard_change:
          max_items: 5
          unit: "шт."

  - group: "Дополнительные услуги"
    parameters:
      - name: "Лицензия Microsoft SQL Server Enterprise, 2 ядра"
        unit: "шт."
        step: 1
        standard_change:
          unlimited: true

      - name: "Лицензия Microsoft Windows Remote Desktop Services, 1 пользователь"
        unit: "шт."
        step: 1
        standard_change:
          unlimited: true
