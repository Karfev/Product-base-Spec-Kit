# Тарифицируемые параметры услуги.
# Определяет шаги тарификации, лимиты стандартных изменений и предельные значения.
# Schema: tools/schemas/billing-parameters.schema.json

metadata:
  service_code: "{service-code}"
  version: "0.1.0"
  last_updated: "{YYYY-MM-DD}"
  billing_period: "{monthly|quarterly}"   # Расчётный период

groups:
  - group: "{Группа параметров 1}"        # Например: "Вычислительные ресурсы"
    parameters:
      - name: "{Параметр 1}"              # Например: "Процессорные ядра, vCPU"
        unit: "{ед. изм.}"               # Например: "шт."
        step: {N}                         # Шаг изменения при тарификации
        min: {N}                          # Минимальное значение (если есть)
        max: {N}                          # Максимальное значение (если есть)
        standard_change:
          pct: {N}                        # % разового стандартного изменения
          max_value: {N}                  # Предельное значение после изменения
          unit: "{ед. изм.}"

      - name: "{Параметр 2}"
        unit: "{ед. изм.}"
        step: {N}
        standard_change:
          pct: {N}
          max_value: {N}
          unit: "{ед. изм.}"

  - group: "{Группа параметров 2}"       # Например: "Услуги связи"
    parameters:
      - name: "{Параметр 3}"
        unit: "{ед. изм.}"
        step: {N}
        standard_change:
          max_items: {N}                  # Для штучных параметров — макс. количество
          unit: "{ед. изм.}"

  - group: "{Группа параметров 3}"       # Например: "Дополнительные услуги"
    parameters:
      - name: "{Параметр 4}"
        unit: "{ед. изм.}"
        step: 1
        standard_change:
          unlimited: true                 # Неограниченное изменение

# Условный период для стандартных изменений
change_period_months: {N}                 # Длительность условного периода в месяцах
non_standard_review_days: {N}            # Срок рассмотрения нестандартных изменений
non_standard_max_months: {N}             # Максимальный срок реализации нестандартного изменения
