# Матрица ответственности услуги.
# Определяет, кто отвечает за каждый архитектурный блок
# в части эксплуатации (operate) и преобразования (transform).
# Schema: tools/schemas/responsibilities.schema.json

metadata:
  service_code: "{service-code}"
  version: "0.1.0"
  last_updated: "{YYYY-MM-DD}"

# Матрица по архитектурным блокам (Таблица 1 из внутренней спецификации)
architectural_blocks:
  - name: "{Архитектурный блок 1}"
    responsible: "{Организация / подразделение}"
    operate: "{Организация}"       # Эксплуатация, обслуживание, решение инцидентов
    transform: "{Организация}"     # Преобразование: проектирование, внедрение изменений

  - name: "{Архитектурный блок 2}"
    responsible: "{Организация}"
    operate: "{Организация}"
    transform: "{Организация}"

  - name: "{Внешняя смежная система}"
    responsible: "{Внешний поставщик}"
    operate: "{Внешний поставщик}"
    transform: "{Внешний поставщик}"

# Матрица по компонентам КТС (Таблица 2 из внутренней спецификации)
kts_components:
  - name: "{Компонент КТС 1}"
    operate: "{Организация}"       # Эксплуатация услуг
    transform: "{Организация}"     # Преобразование услуг

  - name: "{Компонент КТС 2}"
    operate: "{Организация}"
    transform: "{Организация}"
