metadata:
  initiative: INIT-2026-009-smoke-test
  product: platform
  owner: '@smoke-tester'
  profile: standard
  version: 0.1.0
  last_updated: '2026-04-12'
  graduated: true
  initiative_status: archived
requirements:
- id: REQ-EXPORT-001
  title: Create export request via REST API
  type: functional
  priority: P0
  status: draft
  description: 'Пользователь MUST иметь возможность создать запрос на экспорт проектного
    отчёта через REST API endpoint POST /exports с указанием project_id и формата.

    '
  acceptance_criteria:
  - Given authenticated user When POST /exports with valid project_id Then return
    202 with export_id
  - Given unauthenticated request When POST /exports Then return 401
  trace:
    adr:
    - INIT-2026-009-ADR-0001-async-queue
    contracts:
    - contracts/openapi.yaml#/paths/~1exports/post
    schemas:
    - contracts/schemas/export.schema.json
    tests:
    - tests/e2e/export.spec.ts::REQ-EXPORT-001
    components:
    - export-service
- id: REQ-EXPORT-002
  title: Support JSON and CSV export formats
  type: functional
  priority: P1
  status: draft
  description: 'Система MUST поддерживать экспорт в форматах JSON и CSV. Формат указывается
    в параметре format при создании запроса.

    '
  acceptance_criteria:
  - Given export request with format=json When export completes Then result file is
    valid JSON
  - Given export request with format=csv When export completes Then result file is
    valid CSV with headers
  trace:
    contracts:
    - contracts/openapi.yaml#/paths/~1exports/post
    tests:
    - tests/e2e/export.spec.ts::REQ-EXPORT-002
    components:
    - export-service
- id: REQ-EXPORT-003
  title: Async export with completion notification
  type: functional
  priority: P1
  status: draft
  description: 'Экспорт MUST выполняться асинхронно. По завершении система MUST публиковать
    событие export.completed с ссылкой на скачивание.

    '
  acceptance_criteria:
  - Given export request When processing completes Then export.completed event is
    published
  - Given export_id When GET /exports/{id} Then return current status (pending|completed|failed)
  trace:
    contracts:
    - contracts/asyncapi.yaml#/channels/export.report.completed
    - contracts/openapi.yaml#/paths/~1exports~1{id}/get
    tests:
    - tests/e2e/export.spec.ts::REQ-EXPORT-003
    components:
    - export-service
- id: REQ-EXPORT-004
  title: Export latency P95 under 30 seconds
  type: nfr
  priority: P1
  status: draft
  description: 'API endpoint для экспорта SHOULD завершать генерацию за P95 < 30s
    при стандартной нагрузке до 100 concurrent exports.

    '
  metrics:
  - name: export_duration_p95_seconds
    target: 30
    measurement: apm
  trace:
    slo: ops/slo.yaml#export-latency
    tests:
    - tests/perf/export-latency.jmx::REQ-EXPORT-004
    components:
    - export-service
