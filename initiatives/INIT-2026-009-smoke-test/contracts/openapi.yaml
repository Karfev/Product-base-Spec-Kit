# Lint command: redocly lint initiatives/INIT-2026-009-smoke-test/contracts/openapi.yaml
openapi: "3.1.0"
info:
  title: Export Project Reports API
  version: "1.0.0"
  description: Export project reports in JSON/CSV format (REQ-EXPORT-001–004)

paths:
  /exports:
    post:
      summary: Create export request (REQ-EXPORT-001, REQ-EXPORT-002)
      operationId: createExport
      tags: [exports]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExportRequest"
      responses:
        "202":
          description: Accepted — export job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Export"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /exports/{id}:
    get:
      summary: Get export status (REQ-EXPORT-003)
      operationId: getExport
      tags: [exports]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Export status and download link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Export"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    CreateExportRequest:
      type: object
      required: [project_id, format]
      properties:
        project_id:
          type: string
          format: uuid
          description: ID of the project to export
        format:
          type: string
          enum: [json, csv]
          description: Export file format

    Export:
      type: object
      required: [id, project_id, format, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        format:
          type: string
          enum: [json, csv]
        status:
          type: string
          enum: [pending, processing, completed, failed]
        download_url:
          type: string
          format: uri
          nullable: true
          description: Available when status is completed
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    Unauthorized:
      description: Auth required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
