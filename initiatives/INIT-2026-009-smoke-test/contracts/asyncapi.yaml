# AsyncAPI 3.0 — event-driven interfaces for export
# Валидация: asyncapi validate contracts/asyncapi.yaml

asyncapi: "3.0.0"
info:
  title: "Export Events"
  version: "1.0.0"
  description: "Events for export project reports (REQ-EXPORT-003)"

channels:
  export.report.completed:
    address: "export.report.completed"
    description: "Published when an export report generation is completed"
    messages:
      ExportCompletedEvent:
        $ref: "#/components/messages/ExportCompletedEvent"

operations:
  publishExportCompleted:
    action: send
    channel:
      $ref: "#/channels/export.report.completed"
    summary: "Published when export report is ready for download"

components:
  messages:
    ExportCompletedEvent:
      name: "ExportCompletedEvent"
      title: "Export Completed"
      summary: "Notifies that an export report is ready for download"
      contentType: application/json
      payload:
        $ref: "#/components/schemas/ExportCompletedEventPayload"

  schemas:
    ExportCompletedEventPayload:
      type: object
      additionalProperties: false
      required: [eventId, occurredAt, data]
      properties:
        eventId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: false
          required: [export_id, project_id, format, download_url]
          properties:
            export_id:
              type: string
              format: uuid
              description: "ID of the completed export"
            project_id:
              type: string
              format: uuid
              description: "ID of the exported project"
            format:
              type: string
              enum: [json, csv]
              description: "Export file format"
            download_url:
              type: string
              format: uri
              description: "URL to download the exported file"
