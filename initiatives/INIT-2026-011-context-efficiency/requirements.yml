metadata:
  initiative: "INIT-2026-011-context-efficiency"
  product: "platform"
  owner: "@dmitriy"
  profile: "minimal"
  version: "0.4.0"
  last_updated: "2026-04-12"
  initiative_status: "active"

requirements:
  - id: "REQ-CTX-001"
    title: "Lean constitution refactoring"
    type: functional
    priority: P2
    status: implemented
    description: >
      Refactoring constitution.md: вынести Архкомм (~45 строк) в
      presets/archkom.md, GSD-интеграцию (~50 строк) в presets/gsd.md.
      Сжать оставшиеся секции (убрать prose, оставить таблицы, удалить
      секцию «Ссылки»). Целевой размер lean constitution: ≤ 140 строк.
    acceptance_criteria:
      - "Given constitution.md refactored, When wc -l, Then ≤ 140 строк"
      - "Given presets/archkom.md created, When read, Then содержит полную секцию Архкомм из оригинала"
      - "Given presets/gsd.md created, When read, Then содержит полную секцию GSD из оригинала"
      - "Given lean constitution, When diff vs original, Then нет потери семантики (все принципы, ID-схемы, workflow сохранены)"
    trace:
      prd: "prd.md#scope"

  - id: "REQ-CTX-002"
    title: "Preset loading в commands"
    type: functional
    priority: P2
    status: implemented
    description: >
      Commands, использующие Архкомм или GSD секции, обновлены:
      добавлен Read presets/archkom.md или presets/gsd.md соответственно.
      Commands, не использующие эти секции, грузят только lean constitution.
      Маппинг command → preset документирован.
    acceptance_criteria:
      - "Given /speckit-consilium, When executed, Then reads presets/archkom.md"
      - "Given /speckit-gsd-bridge, When executed, Then reads presets/gsd.md"
      - "Given /speckit-implement, When executed, Then does NOT read presets/*.md"
      - "Given command audit, When all 29 commands checked, Then ≤ 5 commands load archkom, ≤ 4 commands load gsd"
    trace:
      prd: "prd.md#scope"

  - id: "REQ-CTX-003"
    title: "Auto-generated requirements-index.md"
    type: functional
    priority: P2
    status: implemented
    description: >
      После каждого вызова /speckit-requirements автоматически генерируется
      requirements-index.md рядом с requirements.yml. Формат: markdown
      таблица с колонками ID, Title, Priority, Status. Tracked в git.
      Header содержит дату генерации и source file hash для stale detection.
    acceptance_criteria:
      - "Given /speckit-requirements completes, When ls initiative dir, Then requirements-index.md exists"
      - "Given requirements-index.md, When parsed, Then columns: ID, Title, P, Status"
      - "Given requirements.yml с 30 REQs, When index generated, Then index ≤ 40 строк"
      - "Given index, When source hash matches requirements.yml, Then stale=false"
    trace:
      prd: "prd.md#scope"

  - id: "REQ-CTX-004"
    title: "Auto-generated contracts-index.md"
    type: functional
    priority: P3
    status: implemented
    description: >
      После каждого вызова /speckit-contracts автоматически генерируется
      contracts/contracts-index.md. Формат: markdown таблица с колонками
      Method, Path, Summary. Tracked в git. Аналогичная механика stale
      detection как в REQ-CTX-003.
    acceptance_criteria:
      - "Given /speckit-contracts completes, When ls contracts/, Then contracts-index.md exists"
      - "Given contracts-index.md, When parsed, Then columns: Method, Path, Summary"
      - "Given openapi.yaml с 30 endpoints, When index generated, Then index ≤ 40 строк"
    trace:
      prd: "prd.md#scope"

  - id: "REQ-CTX-005"
    title: "Command loading rules: index vs full"
    type: functional
    priority: P2
    status: implemented
    description: >
      Каждый command загружает requirements и contracts по правилам:
      L4 commands (implement, plan, tasks, specify) → requirements-index.md +
      targeted read конкретных REQs из spec. L3 write commands (requirements) →
      full requirements.yml. L3 read commands (prd, contracts) → index only.
      Evidence commands (trace, rtm) → full. Правила документированы в
      constitution.
    acceptance_criteria:
      - "Given /speckit-implement, When loading context, Then reads requirements-index.md, NOT full requirements.yml"
      - "Given /speckit-trace, When loading context, Then reads full requirements.yml (needs trace fields)"
      - "Given /speckit-prd cross-scan, When scanning other INITs, Then reads requirements-index.md per INIT"
      - "Given loading rules, When documented in constitution, Then table: command-type → what-to-load"
    trace:
      prd: "prd.md#scope"

  - id: "REQ-CTX-006"
    title: "Phase-gated loading table"
    type: functional
    priority: P3
    status: implemented
    description: >
      Таблица Phase → Load List в constitution или session middleware.
      Фазы: Discovery, Product, Architecture, L4-Spec, L4-Implement, Evidence.
      Для каждой фазы: must_load, skip. Integration с session state
      (INIT-2026-008): session file содержит текущую фазу, command при старте
      lookup phase → load list. Escape hatch: --full-context flag.
    acceptance_criteria:
      - "Given phase=L4-implement in session, When command starts, Then loads only must_load files for that phase"
      - "Given --full-context flag, When any command, Then loads all files (override)"
      - "Given phase-gated table, When documented, Then covers 6 phases with explicit must_load and skip lists"
    trace:
      prd: "prd.md#scope"
      dependency: "INIT-2026-008-session-state"

  - id: "REQ-CTX-007"
    title: "Index stale detection CI gate"
    type: functional
    priority: P3
    status: implemented
    description: >
      make validate проверяет, что requirements-index.md и contracts-index.md
      не stale. Stale = source file hash в index header не совпадает с текущим
      hash source. При stale — warning на PR (не blocking, т.к. index —
      convenience, не source of truth).
    acceptance_criteria:
      - "Given requirements.yml modified after index, When make validate, Then warning: index stale"
      - "Given index up-to-date, When make validate, Then no warning"
      - "Given stale check, When PR, Then warning mode (not blocking)"
    trace:
      prd: "prd.md#scope"
