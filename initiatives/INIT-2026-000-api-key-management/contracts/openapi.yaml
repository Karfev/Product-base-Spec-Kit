# Lint command: redocly lint initiatives/INIT-2026-000-api-key-management/contracts/openapi.yaml
openapi: "3.1.1"
info:
  title: API Key Management
  version: "1.0.0"
  description: Manages API keys for platform authentication (REQ-AUTH-001–005)

paths:
  /api-keys:
    get:
      summary: List API keys (REQ-AUTH-003)
      operationId: listApiKeys
      tags: [api-keys]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of API keys (secret never included)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create API key (REQ-AUTH-001, REQ-AUTH-005)
      operationId: createApiKey
      tags: [api-keys]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: Created — secret returned once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyWithSecret"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api-keys/{id}:
    delete:
      summary: Revoke API key (REQ-AUTH-002)
      operationId: revokeApiKey
      tags: [api-keys]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    ApiKey:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true

    ApiKeyWithSecret:
      allOf:
        - $ref: "#/components/schemas/ApiKey"
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              description: Plaintext secret — returned only once at creation

    CreateApiKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        expires_at:
          type: string
          format: date-time
          nullable: true

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    Unauthorized:
      description: Auth required or key invalid/expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
