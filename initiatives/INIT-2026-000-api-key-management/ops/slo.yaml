---
apiVersion: openslo/v1
kind: DataSource
metadata:
  name: platform-prometheus
spec:
  type: Prometheus
  connectionDetails:
    url: http://prometheus.platform.internal
---
apiVersion: openslo/v1
kind: SLI
metadata:
  name: api-key-auth-latency-sli
spec:
  thresholdMetric:
    source: platform-prometheus
    queryType: promql
    query: >
      histogram_quantile(0.95,
        sum(rate(http_request_duration_seconds_bucket{handler="/api-keys"}[5m]))
        by (le)
      ) * 1000
---
apiVersion: openslo/v1
kind: SLO
metadata:
  name: api-key-auth-latency
  labels:
    req: REQ-AUTH-004
spec:
  sli:
    metadata:
      name: api-key-auth-latency-sli
  objectives:
    - target: 0.95
      value: 10
  timeWindow:
    - duration: 30d
      isRolling: true
  budgetingMethod: Occurrences
---
apiVersion: openslo/v1
kind: SLI
metadata:
  name: api-key-auth-availability-sli
spec:
  thresholdMetric:
    source: platform-prometheus
    queryType: promql
    query: >
      1 - (
        sum(rate(http_requests_total{handler="/api-keys",status=~"5.."}[5m]))
        /
        sum(rate(http_requests_total{handler="/api-keys"}[5m]))
      )
---
apiVersion: openslo/v1
kind: SLO
metadata:
  name: api-key-auth-availability
spec:
  sli:
    metadata:
      name: api-key-auth-availability-sli
  objectives:
    - target: 0.999
      value: 0.999
  timeWindow:
    - duration: 30d
      isRolling: true
  budgetingMethod: Occurrences
