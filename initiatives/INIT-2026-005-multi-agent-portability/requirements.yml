# Реестр требований инициативы.
# Команда валидации: make validate
metadata:
  initiative: "INIT-2026-005-multi-agent-portability"
  product: "speckit"
  owner: "@karfev"
  profile: "standard"
  version: "0.1.0"
  last_updated: "2026-04-11"

requirements:
  - id: "REQ-PORT-001"
    title: "AGENTS.md universal entry point"
    type: "functional"
    priority: "P0"
    status: "proposed"
    description: >
      SpecKit MUST include AGENTS.md in the repository root as a universal
      entry point for AI coding agents (OpenCode, Kilo Code, Codex CLI, Gemini CLI,
      and any AGENTS.md-compatible tool). AGENTS.md MUST describe the repository
      structure, list all available /speckit-* skills, and reference CLAUDE.md
      for Claude Code users. AGENTS.md content MUST be kept in sync with
      command files via CI check.
    acceptance_criteria:
      - "Given any AGENTS.md-compatible agent opens the SpecKit repo, when it reads AGENTS.md, then it understands available skills and repo structure"
      - "Given CI runs on every PR, when AGENTS.md skill references are checked, then all referenced .claude/commands/*.md files exist"
    trace:
      components:
        - "AGENTS.md"
        - "tools/scripts/check-agents-md.py"
      tests:
        - "tests/docs/test-agents-md-links.sh"

  - id: "REQ-PORT-002"
    title: "OpenCode SKILL.md compatibility verification"
    type: "functional"
    priority: "P0"
    status: "proposed"
    description: >
      All 26 /speckit-* commands MUST be verified for compatibility with OpenCode.
      Verification covers: $ARGUMENTS substitution, file read/write operations,
      bash command execution, multi-turn dialogue flow. Commands where behaviour
      diverges MUST be documented in docs/COMPAT-MATRIX.md with workaround.
    acceptance_criteria:
      - "Given each of 26 speckit-* commands is run in OpenCode, when output is compared to Claude Code baseline, then >= 22 commands produce equivalent artifacts"
      - "Given $ARGUMENTS is used in a command, when OpenCode executes it, then the argument is correctly substituted"
    trace:
      tests:
        - "tests/compat/opencode-smoke-test.md"
      components:
        - "docs/COMPAT-MATRIX.md"
        - ".opencode/skills"

  - id: "REQ-PORT-003"
    title: "Kilo Code SKILL.md compatibility verification"
    type: "functional"
    priority: "P0"
    status: "proposed"
    description: >
      All 26 /speckit-* commands MUST be verified for compatibility with Kilo Code
      (VS Code and JetBrains). Verification covers: command invocation from
      IDE Command Palette, $ARGUMENTS handling, file operations, terminal commands.
    acceptance_criteria:
      - "Given each of 26 speckit-* commands is invoked from Kilo Code VS Code, when output is compared to Claude Code baseline, then >= 22 commands produce equivalent artifacts"
      - "Given Kilo Code JetBrains plugin is used, when /speckit-start is invoked, then it completes the full guided flow"
    trace:
      tests:
        - "tests/compat/kilocode-smoke-test.md"
      components:
        - "docs/COMPAT-MATRIX.md"

  - id: "REQ-PORT-004"
    title: "OpenCode on-premise setup guide"
    type: "functional"
    priority: "P1"
    status: "proposed"
    description: >
      docs/SETUP-OPENCODE.md MUST provide a complete on-premise setup guide covering:
      OpenCode installation, Ollama installation and model configuration for
      H100 (80 GB) and RTX 6000 PRO Blackwell (96 GB), recommended models,
      SpecKit configuration, and first /speckit-start run.
    acceptance_criteria:
      - "Given a clean Ubuntu 22.04 machine with Nvidia drivers, when following SETUP-OPENCODE.md, then OpenCode runs /speckit-start successfully in < 60 minutes"
      - "Given SETUP-OPENCODE.md, when a new user follows it, then no Anthropic API key is required"
    trace:
      tests:
        - "tests/setup/test-opencode-setup.sh"
      components:
        - "docs/SETUP-OPENCODE.md"

  - id: "REQ-PORT-005"
    title: "Kilo Code on-premise setup guide"
    type: "functional"
    priority: "P1"
    status: "proposed"
    description: >
      docs/SETUP-KILOCODE.md MUST provide a complete on-premise setup guide covering:
      Kilo Code VS Code extension, local LLM endpoint configuration (Ollama or vLLM),
      recommended models, SpecKit workspace setup, and first command invocation.
    acceptance_criteria:
      - "Given VS Code with Kilo Code extension, when following SETUP-KILOCODE.md, then /speckit-start runs successfully with local Ollama endpoint in < 45 minutes"
      - "Given JetBrains setup section, when a user follows it, then speckit commands are accessible"
    trace:
      tests:
        - "tests/setup/test-kilocode-setup.sh"
      components:
        - "docs/SETUP-KILOCODE.md"

  - id: "REQ-PORT-006"
    title: "Agent compatibility matrix in README"
    type: "functional"
    priority: "P1"
    status: "proposed"
    description: >
      README.md MUST include an Agent Compatibility section with a table showing
      support status for each agent across key dimensions: custom commands,
      AGENTS.md support, local LLM, on-premise deployment.
    acceptance_criteria:
      - "Given README.md, when the Agent Compatibility section is read, then it contains a table with >= 3 agents and >= 4 dimensions"
    trace:
      components:
        - "README.md"

  - id: "REQ-PORT-007"
    title: "ADR: local model selection for H100 and RTX 6000 PRO Blackwell"
    type: "functional"
    priority: "P1"
    status: "proposed"
    description: >
      An Architecture Decision Record MUST document the selection of recommended
      local LLM models for on-premise deployment. ADR MUST cover model candidates,
      VRAM requirements, evaluation criteria, and recommendation per hardware tier.
    acceptance_criteria:
      - "Given decisions/INIT-2026-005-ADR-0001-model-selection.md exists, when it is read, then it contains model comparison table with VRAM and accuracy columns"
      - "Given ADR recommends models, when SETUP guides reference it, then recommendations are consistent"
    trace:
      adr:
        - "decisions/INIT-2026-005-ADR-0001-model-selection"
      components:
        - "docs/SETUP-OPENCODE.md"
        - "docs/SETUP-KILOCODE.md"

  - id: "REQ-PORT-008"
    title: "On-premise stack latency SLO"
    type: "nfr"
    priority: "P1"
    status: "proposed"
    description: >
      The on-premise SpecKit stack SHOULD complete /speckit-prd in <= 120 seconds
      on H100 80 GB and <= 300 seconds on RTX 6000 PRO Blackwell 96 GB,
      both with Qwen2.5-Coder-32B fp16.
    metrics:
      - name: "speckit_prd_latency_h100_seconds"
        target: 120
        measurement: "wall_clock_timing"
        iso_characteristic: "performance_efficiency"
        iso_sub_characteristic: "time_behaviour"
      - name: "speckit_prd_latency_rtx6000pro_seconds"
        target: 300
        measurement: "wall_clock_timing"
        iso_characteristic: "performance_efficiency"
        iso_sub_characteristic: "time_behaviour"
    trace:
      adr:
        - "decisions/INIT-2026-005-ADR-0001-model-selection"
      tests:
        - "tests/perf/onprem-latency.sh"
