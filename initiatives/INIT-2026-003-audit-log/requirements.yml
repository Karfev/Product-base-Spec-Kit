metadata:
  initiative: INIT-2026-003-audit-log
  product: platform
  owner: "@platform-team"
  profile: standard
  version: 0.1.0
  last_updated: "2026-04-10"

requirements:
  - id: "REQ-AUDIT-001"
    title: "Record audit event on significant user action"
    type: functional
    priority: P0
    status: draft
    description: >
      The platform MUST record an immutable audit event whenever a user performs
      a significant action: create, update, delete a resource; change settings;
      authenticate; or opt-out of notifications. Each event MUST include
      timestamp, user_id, action_type, resource_type, resource_id, and source IP.
      Events are captured by subscribing to domain events via RabbitMQ.
    acceptance_criteria:
      - "Given a user creates a resource, when the action completes, then an audit event with action_type=create is persisted within 5 seconds"
      - "Given a user opts out of a notification category, when the opt-out event is published, then an audit event with action_type=update and resource_type=notification_preference is recorded"
      - "Given a system/automated action occurs, when the action completes, then no audit event is recorded (user-initiated only)"
    trace:
      prd: "prd.md#scope"
      adr:
        - "decisions/INIT-2026-003-ADR-0001-storage-strategy.md"
      contracts:
        - "contracts/asyncapi.yaml#/channels/audit.event.recorded"
      schemas:
        - "contracts/schemas/audit-event.schema.json"

  - id: "REQ-AUDIT-002"
    title: "List audit log entries with filtering and pagination"
    type: functional
    priority: P0
    status: draft
    description: >
      The platform MUST provide a REST API endpoint GET /audit-logs that returns
      audit log entries filtered by user_id, action_type, resource_type, and
      date range (date_from, date_to). Results MUST be paginated (page, per_page
      parameters). Default sort: timestamp descending.
    acceptance_criteria:
      - "Given audit events exist, when GET /audit-logs is called without filters, then all events are returned paginated with default per_page=50"
      - "Given audit events exist for multiple users, when GET /audit-logs?user_id=123 is called, then only events for user 123 are returned"
      - "Given a date range filter is provided, when GET /audit-logs?date_from=2026-01-01&date_to=2026-03-31 is called, then only events within that range are returned"
      - "Given more events than per_page, when the first page is returned, then response includes total_count and pagination metadata"
    trace:
      prd: "prd.md#scope"
      contracts:
        - "contracts/openapi.yaml#/paths/~1audit-logs/get"

  - id: "REQ-AUDIT-003"
    title: "Export filtered audit logs as CSV"
    type: functional
    priority: P1
    status: draft
    description: >
      The platform MUST provide a REST API endpoint GET /audit-logs/export that
      returns filtered audit log entries as a downloadable CSV file. The endpoint
      MUST support the same filter parameters as GET /audit-logs. CSV MUST include
      headers: timestamp, user_id, action_type, resource_type, resource_id, source_ip.
    acceptance_criteria:
      - "Given audit events exist, when GET /audit-logs/export is called with filters, then a CSV file is returned with Content-Type text/csv"
      - "Given the export contains events, when the CSV is opened, then each row corresponds to one audit event with all required columns"
      - "Given no events match the filter, when export is called, then an empty CSV with headers only is returned"
    trace:
      prd: "prd.md#scope"
      contracts:
        - "contracts/openapi.yaml#/paths/~1audit-logs~1export/get"

  - id: "REQ-AUDIT-004"
    title: "Audit log query latency SLO"
    type: nfr
    priority: P1
    status: draft
    description: >
      The GET /audit-logs endpoint MUST meet latency SLO targets under normal
      operational load. The SLO applies to queries over the full 2-year retention
      window with typical filter parameters.
    metrics:
      - name: "p95_latency_ms"
        target: 300
        measurement: "APM (Datadog) on GET /audit-logs"
      - name: "p99_latency_ms"
        target: 1000
        measurement: "APM (Datadog) on GET /audit-logs"
    trace:
      prd: "prd.md#scope"
      contracts:
        - "contracts/openapi.yaml#/paths/~1audit-logs/get"
      slo: "ops/slo.yaml#audit-query-latency"

  - id: "REQ-AUDIT-005"
    title: "Audit log retention with automatic cleanup"
    type: nfr
    priority: P1
    status: draft
    description: >
      Audit log entries MUST be retained for a minimum of 2 years (730 days)
      to meet GDPR and SOC2 audit trail requirements. Entries older than the
      retention period MUST be automatically purged. The purge process MUST NOT
      affect query latency of active data.
    metrics:
      - name: "retention_days"
        target: 730
        measurement: "Database query: SELECT MIN(timestamp) FROM audit_events"
      - name: "purge_impact_p95_ms"
        target: 0
        measurement: "APM delta during purge window vs normal"
    trace:
      prd: "prd.md#scope"
      adr:
        - "decisions/INIT-2026-003-ADR-0001-storage-strategy.md"
      slo: "ops/slo.yaml#audit-query-latency"
