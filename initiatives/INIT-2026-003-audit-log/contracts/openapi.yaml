# FILE: contracts/openapi.yaml
# OpenAPI 3.1.0 — Audit Log API
# Lint: redocly lint contracts/openapi.yaml
# Breaking diff: oasdiff breaking contracts/openapi.yaml <base>

openapi: "3.1.0"
info:
  title: "Audit Log API"
  version: "0.1.0"
  description: "REST API for querying and exporting platform audit logs"
  contact:
    name: "platform-team"

servers:
  - url: "https://api.example.com"
    description: "Production"
  - url: "https://api.staging.example.com"
    description: "Staging"

paths:
  /audit-logs:
    get:
      operationId: listAuditLogs
      summary: "REQ-AUDIT-002 List audit log entries with filtering and pagination"
      tags: ["audit"]
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: string
          description: "Filter by user ID"
        - name: action_type
          in: query
          required: false
          schema:
            type: string
            enum: ["create", "update", "delete", "access", "auth"]
          description: "Filter by action type"
        - name: resource_type
          in: query
          required: false
          schema:
            type: string
          description: "Filter by resource type"
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: "Filter events after this timestamp (inclusive)"
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: "Filter events before this timestamp (exclusive)"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: "Page number"
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: "Number of results per page"
      responses:
        "200":
          description: "Paginated list of audit log entries"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "400":
          description: "Bad Request — invalid filter parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized — missing or invalid Bearer token"

  /audit-logs/export:
    get:
      operationId: exportAuditLogs
      summary: "REQ-AUDIT-003 Export filtered audit logs as CSV"
      tags: ["audit"]
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: string
        - name: action_type
          in: query
          required: false
          schema:
            type: string
            enum: ["create", "update", "delete", "access", "auth"]
        - name: resource_type
          in: query
          required: false
          schema:
            type: string
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: "CSV file download"
          content:
            text/csv:
              schema:
                type: string
          headers:
            Content-Disposition:
              schema:
                type: string
              description: 'attachment; filename="audit-logs-export.csv"'
        "400":
          description: "Bad Request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"

components:
  schemas:
    AuditLogEntry:
      type: object
      additionalProperties: false
      required: [id, timestamp, user_id, action_type, resource_type, resource_id]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique audit event identifier"
        timestamp:
          type: string
          format: date-time
          description: "When the action occurred"
        user_id:
          type: string
          description: "ID of the user who performed the action"
        action_type:
          type: string
          enum: ["create", "update", "delete", "access", "auth"]
          description: "Type of action performed"
        resource_type:
          type: string
          description: "Type of resource affected"
        resource_id:
          type: string
          description: "ID of the resource affected"
        source_ip:
          type: string
          description: "IP address of the request origin"
        metadata:
          type: object
          description: "Additional context (e.g., changed fields)"

    AuditLogListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationMeta:
      type: object
      additionalProperties: false
      required: [page, per_page, total_count, total_pages]
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
        total_pages:
          type: integer

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
