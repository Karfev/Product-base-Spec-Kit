# FILE: ops/slo.yaml
# OpenSLO v1 multi-document (разделитель ---)
# Ссылка спецификации: https://github.com/OpenSLO/OpenSLO

---
apiVersion: openslo/v1
kind: DataSource
metadata:
  name: datadog-apm
spec:
  type: Datadog
  connectionDetails:
    url: "https://app.datadoghq.com"

---
apiVersion: openslo/v1
kind: SLI
metadata:
  name: audit-query-latency-sli
spec:
  description: "P95 latency for GET /audit-logs endpoint"
  thresholdMetric:
    metricSource:
      metricSourceRef: datadog-apm
      type: Datadog
      spec:
        query: "p95:trace.express.request{resource_name:get_/audit-logs}"

---
apiVersion: openslo/v1
kind: SLO
metadata:
  name: audit-query-latency
spec:
  service: platform
  description: "P95 latency < 300ms for GET /audit-logs queries"
  budgetingMethod: Occurrences
  objectives:
    - displayName: "P95 < 300ms"
      target: 0.95
      valueMetric:
        metricSource:
          metricSourceRef: datadog-apm
          type: Datadog
          spec:
            query: "p95:trace.express.request{resource_name:get_/audit-logs}"
  timeWindow:
    - duration: 30d
      isRolling: true
