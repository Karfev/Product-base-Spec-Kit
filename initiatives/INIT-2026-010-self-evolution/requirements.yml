metadata:
  initiative: "INIT-2026-010-self-evolution"
  product: "platform"
  owner: "@dmitriy"
  profile: "minimal"
  version: "0.3.0"
  last_updated: "2026-04-12"
  initiative_status: "active"

requirements:
  - id: "REQ-EVOL-001"
    title: "Post-initiative reflection command"
    type: functional
    priority: P2
    status: implemented
    description: >
      Создать command `/speckit-reflect <INIT-ID>`. Агент анализирует
      lifecycle завершённой инициативы: какие L3/L4 артефакты были созданы,
      сколько раз каждый обновлялся, где были bottleneck'и (этапы с
      наибольшим числом итераций/правок), какие артефакты остались
      placeholder'ами или не использовались после создания.
    acceptance_criteria:
      - "Given INIT-2026-006 graduated, When /speckit-reflect INIT-2026-006, Then reflection.md создан в initiatives/INIT-2026-006/"
      - "Given reflection.md создан, When read, Then содержит секции: Usage Analysis, Bottleneck Analysis, Findings, Proposals"
      - "Given INIT не graduated, When /speckit-reflect INIT, Then ошибка: initiative not closed"
    trace:
      prd: "prd.md#scope"

  - id: "REQ-EVOL-002"
    title: "Structured reflection template"
    type: functional
    priority: P2
    status: implemented
    description: >
      Шаблон `reflection.md` со structured секциями: (1) Usage Analysis —
      таблица артефактов (файл, создан, обновлений, использован в downstream),
      (2) Bottleneck Analysis — этапы lifecycle с наибольшим числом итераций,
      (3) Findings — что сработало / что было лишним / рекомендации,
      (4) Evolution Proposals — конкретные предложения по обновлению
      constitution/templates.
    acceptance_criteria:
      - "Given reflection template, When rendered, Then 4 обязательных секции присутствуют"
      - "Given Usage Analysis, When artifact unused, Then помечен как candidate for removal"
      - "Given Bottleneck Analysis, When stage has >3 iterations, Then flagged as bottleneck"
    trace:
      prd: "prd.md#scope"

  - id: "REQ-EVOL-003"
    title: "Evolution proposals в PR-ready формате"
    type: functional
    priority: P2
    status: implemented
    description: >
      Каждый proposal в reflection.md содержит: (1) target file
      (constitution.md / template / command), (2) тип изменения
      (add / modify / deprecate), (3) diff-preview или текстовое описание
      изменения, (4) обоснование на основе данных из reflection.
      Proposals нумеруются: EVOL-YYYY-NNN.
    acceptance_criteria:
      - "Given proposal generated, When read, Then содержит target_file, change_type, diff_preview, rationale"
      - "Given proposal ID, When parsed, Then соответствует формату EVOL-YYYY-NNN"
      - "Given proposal, When applied manually, Then constitution/template обновлён корректно"
    trace:
      prd: "prd.md#scope"

  - id: "REQ-EVOL-004"
    title: "Evolution log"
    type: functional
    priority: P3
    status: implemented
    description: >
      Файл `evolution-log.md` в корне репозитория. Append-only лог всех
      proposals: ID, дата, source INIT, target file, статус
      (proposed / approved / rejected / applied), дата применения.
      Формат: markdown-таблица, машиночитаемая.
    acceptance_criteria:
      - "Given proposal created, When /speckit-reflect completes, Then proposal appended to evolution-log.md"
      - "Given evolution-log.md, When parsed, Then каждая строка содержит ID, date, source_init, target, status"
      - "Given proposal applied, When maintainer updates status, Then status=applied + apply_date"
    trace:
      prd: "prd.md#scope"

  - id: "REQ-EVOL-005"
    title: "Human-in-the-loop approval"
    type: constraint
    priority: P1
    status: implemented
    description: >
      Никакие evolution proposals НЕ применяются автоматически.
      `/speckit-reflect` только генерирует proposals. Применение —
      ручной PR в constitution/templates. Это MUST-constraint:
      framework evolution требует human review и approval.
    acceptance_criteria:
      - "Given /speckit-reflect completed, When proposals generated, Then NO changes to constitution.md or templates/"
      - "Given proposal with status=proposed, When no manual action, Then framework files unchanged"
      - "Given constitution.md, When diff after /speckit-reflect, Then zero changes"
    trace:
      prd: "prd.md#scope"

  - id: "REQ-EVOL-006"
    title: "Health metrics и audit triggers"
    type: functional
    priority: P3
    status: implemented
    description: >
      Опциональные health metrics для framework: число активных commands
      (warn > 30), средний размер command file (warn > 500 строк),
      число шаблонов без использования за последние 5 INIT (candidate
      for deprecation), compliance rate по профилям.
      При превышении threshold — генерация audit-proposal в evolution-log.md.
    acceptance_criteria:
      - "Given 35 commands exist, When health check runs, Then warning: commands > 30 threshold"
      - "Given template unused for 5 INITs, When health check runs, Then deprecation proposal generated"
      - "Given health metrics, When rendered, Then dashboard с текущими значениями vs thresholds"
    trace:
      prd: "prd.md#scope"
