name: Validate Specs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-requirements:
    name: Validate requirements.yml (blocking, smart-scope)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install check-jsonschema pyyaml

      - name: Determine validation scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/main...HEAD)
            OVERRIDE=$(echo "$CHANGED" | grep -cE '^(\.github/|tools/schemas/|tools/scripts/)' || true)
            if [ "$OVERRIDE" -gt "0" ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
              echo "Scope: FULL (override paths changed)"
            else
              INITS=$(echo "$CHANGED" | grep '^initiatives/' | \
                      sed 's|initiatives/\([^/]*\)/.*|\1|' | sort -u | \
                      grep -v '{' || true)
              echo "mode=smart" >> $GITHUB_OUTPUT
              echo "initiatives<<EOF" >> $GITHUB_OUTPUT
              echo "$INITS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              echo "Scope: SMART — $(echo "$INITS" | wc -w | tr -d ' ') initiative(s)"
            fi
          else
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "Scope: FULL (push to main)"
          fi

      - name: Validate requirements.yml against JSON Schema
        run: |
          failed=0
          if [ "${{ steps.scope.outputs.mode }}" = "smart" ]; then
            TARGETS="${{ steps.scope.outputs.initiatives }}"
            if [ -z "$TARGETS" ]; then
              echo "No initiative changes detected — skipping"
              exit 0
            fi
          else
            TARGETS=$(find initiatives -mindepth 1 -maxdepth 1 -type d 2>/dev/null | grep -v '{' | xargs -I{} basename {} || true)
          fi
          for init in $TARGETS; do
            f="initiatives/$init/requirements.yml"
            [ ! -f "$f" ] && continue
            STATUS=$(python3 -c "
          import yaml
          with open('$f') as fh:
              d = yaml.safe_load(fh)
          print(d.get('metadata', {}).get('initiative_status', 'active'))
          " 2>/dev/null || echo "active")
            [ "$STATUS" = "archived" ] && echo "  Skipping $f (archived)" && continue
            echo "  Validating $f (status=$STATUS)..."
            python3 -m check_jsonschema --schemafile tools/schemas/requirements.schema.json "$f" || failed=1
          done
          exit $failed

      - name: Check REQ-ID traceability (L3 ↔ L4)
        run: python tools/scripts/check-trace.py

      - name: Check .specify docs structure (blocking)
        run: python tools/scripts/check-spec-structure.py

      - name: Check .specify docs quality (policy-driven)
        run: python tools/scripts/check-spec-quality.py --needs-clarification-policy blocking

      - name: Validate AGENTS.md skill references
        run: |
          if [ -f AGENTS.md ]; then
            python tools/scripts/check-agents-md.py
          fi

  validate-enterprise:
    name: Validate Enterprise IS classification (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install check-jsonschema pyyaml

      - name: Check Enterprise profile — subsystem-classification.yaml presence and validity
        run: |
          failed=0
          for req in $(find initiatives -name requirements.yml | grep -v '{'); do
            dir=$(dirname "$req")
            profile=$(python3 -c "
          import yaml, sys
          with open('$req') as f:
              data = yaml.safe_load(f)
          print(data.get('metadata', {}).get('profile', ''))
          " 2>/dev/null)
            if [ "$profile" = "enterprise" ]; then
              classfile="$dir/subsystem-classification.yaml"
              if [ ! -f "$classfile" ]; then
                echo "ERROR: $req has profile=enterprise but $classfile is missing" >&2
                failed=1
              else
                echo "Validating $classfile..."
                python3 -m check_jsonschema --schemafile tools/schemas/subsystem-classification.schema.json "$classfile" || failed=1
              fi
            fi
          done
          exit $failed

  validate-registry:
    name: Validate requirements-registry.yml (L2 Products)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install check-jsonschema pyyaml

      - name: Validate requirements-registry.yml against JSON Schema
        run: |
          found=0
          failed=0
          for f in $(find products -name requirements-registry.yml | grep -v '{'); do
            found=1
            echo "Validating $f..."
            python3 -m check_jsonschema --schemafile tools/schemas/requirements-registry.schema.json "$f" || failed=1
          done
          if [ "$found" -eq 0 ]; then
            echo "No requirements-registry.yml files found — skipping"
          fi
          exit $failed

  validate-contracts:
    name: Validate product contracts (L2) — smart-scope
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install check-jsonschema pyyaml

      - name: Detect changed product contracts
        id: scope
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null \
            | grep '^products/.*/contracts/' || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate contract-registry.yml against JSON Schema
        run: |
          found=0
          failed=0
          for f in $(find products -name contract-registry.yml | grep -v '{'); do
            found=1
            echo "Validating $f..."
            python3 -m check_jsonschema --schemafile tools/schemas/contract-registry.schema.json "$f" || failed=1
          done
          if [ "$found" -eq 0 ]; then
            echo "No contract-registry.yml files found — skipping"
          fi
          exit $failed

      - name: Lint product OpenAPI baselines (redocly)
        if: steps.scope.outputs.has_changes == 'true'
        continue-on-error: true
        run: |
          for f in $(find products -name '*.openapi.yml' -o -name 'openapi.yaml' | grep -v '{'); do
            echo "Linting $f..."
            npx @redocly/cli lint "$f" || true
          done

      - name: Lint product AsyncAPI baselines
        if: steps.scope.outputs.has_changes == 'true'
        continue-on-error: true
        run: |
          for f in $(find products -name '*.asyncapi.yml' -o -name 'asyncapi.yaml' | grep -v '{'); do
            echo "Validating $f..."
            npx @asyncapi/cli validate "$f" || true
          done

  validate-services:
    name: Validate service artifacts (L2.5) — warning mode
    runs-on: ubuntu-latest
    continue-on-error: true   # warning mode → станет blocking после 2 недель (см. конституцию)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install check-jsonschema pyyaml

      - name: Validate service requirements.yml
        run: |
          failed=0
          for f in $(find services -name requirements.yml | grep -v '{'); do
            echo "Validating $f..."
            python3 -m check_jsonschema --schemafile tools/schemas/service-requirements.schema.json "$f" || failed=1
          done
          exit $failed

      - name: Validate incident-catalog.yml
        run: |
          for f in $(find services -name incident-catalog.yml | grep -v '{'); do
            echo "Validating $f..."
            python3 -m check_jsonschema --schemafile tools/schemas/incident-catalog.schema.json "$f"
          done

      - name: Validate request-catalog.yml
        run: |
          for f in $(find services -name request-catalog.yml | grep -v '{'); do
            echo "Validating $f..."
            python3 -m check_jsonschema --schemafile tools/schemas/request-catalog.schema.json "$f"
          done

      - name: Validate change-catalog.yml
        run: |
          for f in $(find services -name change-catalog.yml | grep -v '{'); do
            echo "Validating $f..."
            python3 -m check_jsonschema --schemafile tools/schemas/change-catalog.schema.json "$f"
          done

      - name: Validate billing/parameters.yml
        run: |
          for f in $(find services -path '*/billing/parameters.yml' | grep -v '{'); do
            echo "Validating $f..."
            python3 -m check_jsonschema --schemafile tools/schemas/billing-parameters.schema.json "$f"
          done

      - name: Validate responsibilities.yml
        run: |
          for f in $(find services -name responsibilities.yml | grep -v '{'); do
            echo "Validating $f..."
            python3 -m check_jsonschema --schemafile tools/schemas/responsibilities.schema.json "$f"
          done

  lint-docs:
    name: Lint docs (warning mode — will become blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yamllint
        run: pip install yamllint

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli2

      - name: Lint YAML
        run: yamllint -c .yamllint.yml .

      - name: Lint Markdown
        run: markdownlint-cli2 "**/*.md" "#node_modules"
