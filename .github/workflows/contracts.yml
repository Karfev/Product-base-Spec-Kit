name: Validate Contracts

on:
  push:
    branches: [main]
    paths:
      - 'initiatives/**/contracts/**'
  pull_request:
    branches: [main]
    paths:
      - 'initiatives/**/contracts/**'

jobs:
  validate-openapi:
    name: OpenAPI lint + breaking diff
    runs-on: ubuntu-latest
    env:
      CONTRACTS_ENFORCEMENT_MODE: ${{ github.event_name == 'pull_request' && 'pr' || 'release' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Lint OpenAPI specs (blocking on errors)
        run: |
          failed=0
          for f in $(find initiatives -name openapi.yaml | grep -v '{'); do
            echo "Linting $f..."
            redocly lint "$f" || failed=1
          done
          exit $failed

      - name: Check breaking changes with oasdiff (blocking)
        run: |
          echo "Contracts enforcement mode: ${CONTRACTS_ENFORCEMENT_MODE}"
          go install github.com/oasdiff/oasdiff@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          failed=0
          for f in $(find initiatives -name openapi.yaml | grep -v '{'); do
            base=$(git show origin/main:"$f" 2>/dev/null) || continue
            echo "$base" > /tmp/base-openapi.yaml
            echo "Checking breaking changes: $f"
            oasdiff breaking /tmp/base-openapi.yaml "$f" || failed=1
          done
          exit $failed

  validate-asyncapi:
    name: AsyncAPI validate (PR warning / release blocking)
    runs-on: ubuntu-latest
    env:
      ASYNCAPI_ENFORCEMENT_MODE: ${{ github.event_name == 'pull_request' && 'warning' || 'blocking' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AsyncAPI CLI
        run: npm install -g @asyncapi/cli

      - name: Validate AsyncAPI specs
        run: |
          echo "AsyncAPI enforcement mode: ${ASYNCAPI_ENFORCEMENT_MODE}"
          failed=0
          for f in $(find initiatives -name asyncapi.yaml | grep -v '{'); do
            echo "Validating $f..."
            if ! asyncapi validate "$f"; then
              failed=1
            fi
          done

          if [ "$ASYNCAPI_ENFORCEMENT_MODE" = "blocking" ]; then
            exit $failed
          fi
