# Реестр требований инициативы.
# Команда валидации: make validate
# Schema: tools/schemas/requirements.schema.json
#
# golden comment: удалить эту шапку перед заполнением реальной инициативы.
# Живой пример — examples/INIT-2026-099-csv-export/requirements.yml.
#
# КРИТИЧНО (схема):
#   metadata:
#     - initiative MUST соответствовать паттерну INIT-YYYY-NNN-slug
#     - profile ∈ {minimal, standard, extended, enterprise}
#     - version в SemVer (1.2.3 или 1.2.3-rc1)
#     - last_updated в формате YYYY-MM-DD
#   requirement:
#     - id PATTERN: ^REQ-[A-Z0-9]{2,16}-[0-9]{3}$  (REQ-AUTH-001, REQ-EXPORT-042)
#     - type ∈ {functional, nfr, quality, constraint, compliance}
#       (НЕТ "operational" — для операционных требований используй constraint)
#     - priority ∈ {P0, P1, P2, P3}
#     - status ∈ {draft, proposed, approved, implemented, verified, deprecated}
#     - functional MUST иметь acceptance_criteria
#     - nfr MUST иметь metrics
#     - quality MUST иметь metrics + iso_characteristic
#     - REQ-ID immutable после status=approved
#
# КОНВЕНЦИИ ОПИСАНИЙ (BCP 14 / RFC 2119):
#   MUST / SHALL — обязательное требование
#   SHOULD       — рекомендация, отклонение возможно с обоснованием
#   MAY          — необязательно, по усмотрению команды

metadata:
  initiative: "INIT-YYYY-NNN-slug"
  product: "platform"
  owner: "@team-name"
  profile: "standard"
  version: "0.1.0"
  last_updated: "YYYY-MM-DD"
  # Optional метаданные:
  # archkom_level: "У1"           # Архкомм классификация (для крупных систем)
  # archkom_status: "pending"     # pending | approved | approved-with-conditions | rejected | waiver
  # brd_ref: "BRD-2026-NNN"       # Ссылка на BRD-документ
  # initiative_status: "active"   # active | completed | archived

requirements:
  # ----- Functional requirement -----
  - id: "REQ-SCOPE-001"
    title: "{краткий заголовок 3-7 слов}"
    type: "functional"
    priority: "P0"
    status: "proposed"
    description: >
      {one paragraph. Use MUST/SHOULD/MAY. Описывай поведение системы,
      а не реализацию.}
    acceptance_criteria:
      - "Given <предусловие>, when <действие>, then <ожидаемый результат>"
      - "Given <предусловие>, when <действие>, then <ожидаемый результат>"
    trace:
      adr:
        - "INIT-YYYY-NNN-ADR-NNNN-slug"
      contracts:
        - "contracts/openapi.yaml#/paths/~1path/method"
      schemas:
        - "contracts/schemas/entity.schema.json"
      tests:
        - "tests/api/<file>.spec.ts::REQ-SCOPE-001"

  # ----- NFR (требует metrics) -----
  - id: "REQ-SCOPE-002"
    title: "{NFR — обычно P95 latency, availability, throughput}"
    type: "nfr"
    priority: "P1"
    status: "proposed"
    description: >
      {Описание NFR с числовыми границами, нагрузкой и условиями измерения.}
    metrics:
      - name: "metric_name_unit"
        target: 5                                  # число или строка
        measurement: "apm:promql_query_or_source"
        iso_characteristic: "performance_efficiency"
        iso_sub_characteristic: "time_behaviour"
    trace:
      slo: "ops/slo.yaml#slo-name"
      tests:
        - "tests/perf/<file>.k6.js::REQ-SCOPE-002"
      # architecture_views — optional, link NFR/quality requirements to design.md views.
      # Common in Enterprise profile (IS ontology subsystem classification).
      architecture_views:
        - "design.md#т-1"

  # ----- Constraint (нет acceptance/metrics — но может иметь acceptance_criteria) -----
  - id: "REQ-SCOPE-003"
    title: "{Жёсткое ограничение — например, sensitive fields exclusion}"
    type: "constraint"
    priority: "P0"
    status: "proposed"
    description: >
      {Что MUST/MUST NOT происходить. Constraint обычно — про безопасность,
      compliance, обратную совместимость.}
    acceptance_criteria:
      - "Given <условие>, when <действие>, then <ограничение соблюдено>"
    trace:
      tests:
        - "tests/security/<file>.spec.ts::REQ-SCOPE-003"

# golden comment:
# Не делай больше 15 требований в одной инициативе. Если получилось —
# инициатива слишком большая, режь на phases или несколько initiatives.
